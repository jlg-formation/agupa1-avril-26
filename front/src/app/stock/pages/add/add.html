<main>
  <h1>Ajouter un article</h1>
  <form [formGroup]="f">
    <label>
      <span>Nom</span>
      <input type="text" formControlName="name" />
    </label>
    <label>
      <span>Prix</span>
      <input type="number" formControlName="price" />
    </label>
    <label>
      <span>Quantité</span>
      <input type="number" formControlName="qty" />
    </label>
    <div class="error">
      {{ errorMsg() }}
    </div>
    <app-async-btn
      [icon]="faPlus"
      [disabled]="f.invalid"
      [action]="doSubmit()"
      classes="primary"
      (error)="errorMsg.set($event)"
    >
      Ajouter
    </app-async-btn>

    <!-- {{ f.value | json }} -->
  </form>
</main>
