<main>
  <h1>Liste des articles</h1>
  <div class="content">
    <nav>
      <app-async-btn [icon]="faRotateRight" [action]="refresh()" title="Rafraichir" />
      <a title="Ajouter" routerLink="add" class="button">
        <fa-icon [icon]="faPlus" />
      </a>
      <app-async-btn
        [icon]="faTrashCan"
        [action]="remove()"
        title="Supprimer"
        [hidden]="selectedArticleIds.size === 0"
      />
    </nav>
    <div class="error">
      {{ errorMsg() }}
    </div>
    <table>
      <thead>
        <tr>
          <th class="name">Nom</th>
          <th class="price">Prix</th>
          <th class="qty">Quantité</th>
        </tr>
      </thead>
      <tbody>
        @if (articleService.articles() === undefined) {
          <tr>
            <td colspan="3">
              <div class="loading">
                <fa-icon [icon]="faCircleNotch" [animation]="'spin'" />
                <span>Chargement...</span>
              </div>
            </td>
          </tr>
        } @else {
          @for (a of articleService.articles(); track a.id) {
            <tr (click)="select(a.id)" [class.selected]="selectedArticleIds.has(a.id)">
              <td class="name">{{ a.name }}</td>
              <td class="price">{{ a.price }}€</td>
              <td class="qty">{{ a.qty }}</td>
            </tr>
          } @empty {
            <tr>
              <td colspan="3">
                <div>
                  Aucun article.
                  <a routerLink="add">Ajouter un article.</a>
                </div>
              </td>
            </tr>
          }
        }
      </tbody>
    </table>
  </div>
</main>
