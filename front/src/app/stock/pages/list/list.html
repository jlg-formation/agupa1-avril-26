<main>
  <h1>Liste des articles</h1>
  <div class="content">
    <nav>
      <button title="Rafraichir">
        <fa-icon [icon]="faRotateRight" />
      </button>
      <a title="Ajouter" routerLink="add" class="button">
        <fa-icon [icon]="faPlus" />
      </a>
      <button title="Supprimer">
        <fa-icon [icon]="faTrashCan" />
      </button>
    </nav>
    <div class="error">
      {{ errorMsg() }}
    </div>
    <table>
      <thead>
        <tr>
          <th class="name">Nom</th>
          <th class="price">Prix</th>
          <th class="qty">Quantité</th>
        </tr>
      </thead>
      <tbody>
        @for (a of articleService.articles(); track a.id) {
          <tr>
            <td class="name">{{ a.name }}</td>
            <td class="price">{{ a.price }}€</td>
            <td class="qty">{{ a.qty }}</td>
          </tr>
        } @empty {
          <tr>
            <td colspan="3">
              <div>
                Aucun article.
                <a routerLink="add">Ajouter un article.</a>
              </div>
            </td>
          </tr>
        }
      </tbody>
    </table>
  </div>
</main>
