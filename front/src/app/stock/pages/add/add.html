<main>
  <h1>Ajouter un article</h1>
  <form [formGroup]="f">
    <label>
      <span>Nom</span>
      <input type="text" formControlName="name" />
    </label>
    <label>
      <span>Prix</span>
      <input type="number" formControlName="price" />
    </label>
    <label>
      <span>Quantité</span>
      <input type="number" formControlName="qty" />
    </label>
    <button class="primary" [disabled]="f.invalid" (click)="submit()">
      <fa-icon [icon]="faPlus" />
      <span>Ajouter</span>
    </button>
  </form>
</main>
